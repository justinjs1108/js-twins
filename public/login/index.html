<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登入 · JS_TWINS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;500;800;900&family=Hanken+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/bg-cyber.css" />
  <script src="/js/bg-cyber.js"></script>
  <style>
    :root{--bg:#000;--text:#f4f4f4;--text-2:#a8a8ac;--muted:#6a6a70;--line:rgba(255,255,255,.14);--glass:rgba(255,255,255,.04);
      --fd:'Archivo',sans-serif;--fb:'Hanken Grotesk','PingFang TC','Noto Sans TC',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;--danger:#ff6b6b;--ok:#5ed29c;--ease:cubic-bezier(.2,.7,.2,1)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;display:grid;place-items:center;padding:24px;-webkit-font-smoothing:antialiased;overflow:hidden}
    .gl{position:fixed;inset:0;z-index:0;pointer-events:none}
    .gl span{position:absolute;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.06) 20%,rgba(255,255,255,.06) 80%,transparent)}
    .gl span:nth-child(1){left:25%}.gl span:nth-child(2){left:50%}.gl span:nth-child(3){left:75%}
    body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(60% 50% at 50% 0%,rgba(255,255,255,.06),transparent 70%)}
    .card{position:relative;z-index:2;width:100%;max-width:420px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.015));padding:38px 32px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
    .brand{font-family:var(--fd);font-weight:900;letter-spacing:.2em;font-size:15px;color:#fff}
    .brand u{font-weight:200;opacity:.5;text-decoration:none}
    h1{font-family:var(--fd);font-weight:900;font-size:34px;letter-spacing:-.01em;margin:18px 0 6px}
    .sub{color:var(--text-2);font-size:14px;line-height:1.6;margin-bottom:26px}
    label{display:block;font-family:var(--fm);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    input{width:100%;background:rgba(0,0,0,.4);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:14px 16px;font-family:var(--fm);font-size:18px;letter-spacing:4px;text-align:center;text-transform:uppercase}
    input:focus{outline:none;border-color:rgba(255,255,255,.45)}
    input::placeholder{letter-spacing:4px;font-size:14px}
    .btn{width:100%;margin-top:16px;font-family:var(--fm);font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;cursor:pointer;border:1px solid #fff;background:#fff;color:#000;border-radius:10px;padding:14px;transition:all .2s}
    .btn:hover{box-shadow:0 0 24px rgba(255,255,255,.3)}
    .btn:disabled{opacity:.5;cursor:progress}
    .msg{font-size:13px;line-height:1.6;margin-top:14px;min-height:18px}
    .msg.err{color:var(--danger)}.msg.ok{color:var(--ok)}
    .foot{margin-top:22px;font-family:var(--fm);font-size:11px;color:var(--muted);letter-spacing:.06em;line-height:1.7}
    .hint{font-family:var(--fm);font-size:11px;color:var(--muted);letter-spacing:.05em;margin-top:14px;text-align:center;line-height:1.7}
    .remember{display:flex;align-items:center;gap:8px;font-family:var(--fm);font-size:11.5px;color:var(--text-2);letter-spacing:.04em;margin:14px 0 6px;cursor:pointer;text-transform:none}
    .remember input{width:auto;accent-color:#fff;margin:0;cursor:pointer}
  </style>
</head>
<body>
  <div class="gl"><span></span><span></span><span></span></div>
  <div class="card">
    <div class="brand">JS<u>_</u>TWINS</div>
    <h1>登入</h1>
    <p class="sub">輸入你的邀請碼進入工作室。沒有邀請碼？請聯絡管理員。</p>

    <label>邀請碼</label>
    <input id="code" type="text" autocomplete="off" maxlength="12" placeholder="XXX-XXXX-XXX" />
    <label class="remember"><input id="remember" type="checkbox" checked /> 在這個瀏覽器記住代碼，下次自動填好</label>
    <button class="btn" id="go">進入工作室</button>

    <p class="msg" id="msg"></p>
    <p class="hint">JS_TWINS · 創作者工作室</p>
  </div>

  <script>
  (function(){
    var $=function(s){return document.querySelector(s);};
    var params=new URLSearchParams(location.search);
    var next=params.get('next')||'/';
    if(!next.startsWith('/')||next.startsWith('//')) next='/';
    function msg(t,cls){var m=$('#msg');m.textContent=t||'';m.className='msg'+(cls?' '+cls:'');}

    // 已登入就直接進去
    fetch('/api/auth/me',{credentials:'same-origin'}).then(function(r){return r.json();}).then(function(d){ if(d&&d.user) location.replace(next); });

    // 自動幫你填上次的代碼（存在這個瀏覽器，不會上傳）
    try {
      var saved = localStorage.getItem('jst-code');
      if (saved) { $('#code').value = saved; msg('代碼已自動填好，按下方按鈕即可登入','ok'); }
    } catch(e) {}

    // 自動補連字號（讓使用者直接打 12 個字也成）
    $('#code').addEventListener('input', function(e){
      var v=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
      if(v.length>3)  v=v.slice(0,3)+'-'+v.slice(3);
      if(v.length>8)  v=v.slice(0,8)+'-'+v.slice(8,11);
      e.target.value=v;
    });

    function login(){
      var code=$('#code').value.trim().toUpperCase();
      if(!code){ msg('請輸入邀請碼','err'); return; }
      var btn=$('#go'); btn.disabled=true; btn.textContent='登入中…'; msg('');
      fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({code:code})})
        .then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d};});})
        .then(function(x){
          if(!x.ok) throw new Error(x.d.error||'登入失敗');
          // 勾「記住」就把代碼存到瀏覽器本機（不會上傳）
          try {
            if ($('#remember').checked) localStorage.setItem('jst-code', code);
            else localStorage.removeItem('jst-code');
          } catch(e) {}
          location.replace(next);
        })
        .catch(function(e){ msg(e.message,'err'); btn.disabled=false; btn.textContent='進入工作室'; });
    }
    $('#go').addEventListener('click',login);
    $('#code').addEventListener('keydown',function(e){if(e.key==='Enter')login();});
    if (!$('#code').value) $('#code').focus();
  })();
  </script>
</body>
</html>
