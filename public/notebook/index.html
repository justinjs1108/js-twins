<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>記事本 · JS_TWINS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;500;800;900&family=Hanken+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tool.css" />
  <link rel="stylesheet" href="/css/lightbox.css" />
  <script src="/js/guard.js"></script>
  <script src="/js/img.js"></script>
  <script src="/js/lightbox.js"></script>
  <style>
    .editing-flag{font-family:var(--fm);font-size:11.5px;letter-spacing:.1em;color:var(--muted);min-width:0;flex:1}
    .author{font-family:var(--fm);font-size:10.5px;color:var(--muted)}
    .c-body{color:var(--text-2);font-size:13.5px;line-height:1.75;white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.32);border:1px solid var(--line-soft);border-radius:8px;padding:10px 12px;margin-top:6px;max-height:160px;overflow:auto}
  </style>
  <link rel="stylesheet" href="/css/motion.css" />
  <script src="/js/motion.js" defer></script>
</head>
<body>
  <header class="nav">
    <a class="back" href="/">← JS_TWINS</a>
    <span class="h-title">03 · Notebook</span>
    <div class="h-right">
      <span class="who" id="who"></span>
      <span class="cloud" id="cloud">● 連線中…</span>
    </div>
  </header>

  <main class="wrap">
    <div class="hero">
      <span class="no">03 / NOTEBOOK</span>
      <h1>記事本</h1>
      <p>會議紀錄、靈感、重點筆記。可以附一張縮圖，一眼就知道是哪一篇。<b style="color:#fff">所有人共用、雲端永久。</b></p>
    </div>

    <section class="panel">
      <label>標題</label>
      <input id="f-title" type="text" placeholder="例如：2/14 製作會議" />
      <label class="block">內容</label>
      <textarea id="f-body" rows="6" placeholder="把會議重點、想法寫在這裡…"></textarea>

      <div class="thumb-row">
        <div class="thumb-box" id="thumb-box" title="點擊上傳縮圖">
          <span class="ph">📷 點擊<br>上傳縮圖</span>
          <button type="button" class="thumb-rm" id="thumb-rm" title="移除縮圖">✕</button>
        </div>
        <div class="thumb-tip">附一張截圖、白板照、靈感圖都行，會自動壓縮。</div>
      </div>

      <div class="actions">
        <span class="editing-flag" id="flag"></span>
        <button id="cancel" class="btn ghost sm" style="display:none">取消編輯</button>
        <button id="save" class="btn primary">＋ 儲存筆記</button>
      </div>
      <span id="stat" class="stat" style="display:block;margin-top:8px"></span>
    </section>

    <div class="actions" style="margin-bottom:14px">
      <input id="search" class="search" style="flex:1;background:rgba(0,0,0,.35);color:var(--text);border:1px solid var(--line);border-radius:999px;padding:11px 18px;font-size:14px;font-family:inherit" placeholder="🔍 搜尋筆記…" />
      <span id="count" class="stat" style="flex:0 0 auto"></span>
    </div>

    <section class="history" style="margin-top:0">
      <div class="h-list" id="list"></div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
  (function(){
    var $=function(s){return document.querySelector(s);};
    var KIND='note';
    var cache=[];
    var editingId=null;
    var currentThumb=null;

    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function toast(m){var t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show');},1800);}

    document.addEventListener('jstwins-auth',function(e){
      $('#who').textContent='👤 '+e.detail.user;
      $('#cloud').textContent='● 雲端已連線';$('#cloud').classList.add('live');
      reload();
    });

    async function api(path,opts){
      opts=opts||{}; opts.credentials='same-origin';
      opts.headers=Object.assign({'Content-Type':'application/json'},opts.headers||{});
      var r=await fetch(path,opts); var d=await r.json();
      if(!r.ok) throw new Error(d.error||'HTTP '+r.status);
      return d;
    }

    async function reload(){
      try{ var d=await api('/api/items?kind='+KIND); cache=d.items||[]; render(); }
      catch(e){ $('#list').innerHTML='<div class="h-empty">載入失敗：'+esc(e.message)+'</div>'; }
    }

    function render(){
      var q=$('#search').value.trim().toLowerCase();
      var items=cache.filter(function(it){ var d=it.data||{}; return !q || ((d.title||'')+' '+(d.body||'')).toLowerCase().indexOf(q)>=0; });
      $('#count').textContent=items.length+' 篇';
      var box=$('#list');
      if(!items.length){ box.innerHTML='<div class="h-empty">'+(q?'找不到符合的筆記。':'還沒有筆記，從上面寫下第一篇吧。')+'</div>'; return; }
      box.innerHTML=items.map(function(it){
        var d=it.data||{};
        var date=new Date(it.updated_at||it.created_at).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
        var edited=it.updated_at&&it.created_at&&it.updated_at!==it.created_at?' · 已編輯':'';
        var by=it.created_by?'<span class="author">— '+esc(it.created_by)+'</span>':'';
        var thumb=d.thumbnail
          ? '<div class="h-thumb lb-clickable" data-thumb="'+esc(d.thumbnail)+'" style="background-image:url(\''+esc(d.thumbnail)+'\')" title="點擊看大圖"></div>'
          : '<div class="h-thumb empty">無縮圖</div>';
        return '<div class="h-item" data-id="'+it.id+'">'+thumb+
          '<div class="h-main">'+
            '<div class="h-item-head"><div class="h-name'+(d.title?'':' empty')+'">'+esc(d.title||'未命名筆記')+'</div><span class="h-meta">'+date+edited+'　'+by+'</span></div>'+
            '<div class="c-body">'+esc(d.body||'')+'</div>'+
            '<div class="h-acts" style="margin-top:10px"><button class="btn sm edit">✎ 編輯</button><button class="btn sm copy">⧉ 複製</button><button class="btn sm ghost danger del">刪除</button></div>'+
          '</div></div>';
      }).join('');
    }

    function setThumb(dataUrl){
      currentThumb=dataUrl||null;
      var box=$('#thumb-box');
      if(currentThumb){
        var existing=box.querySelector('img'); if(existing) existing.remove();
        var img=document.createElement('img'); img.src=currentThumb;
        box.insertBefore(img, box.querySelector('.thumb-rm'));
        box.classList.add('has-thumb');
      } else {
        var img2=box.querySelector('img'); if(img2) img2.remove();
        box.classList.remove('has-thumb');
      }
    }

    function resetComposer(){
      editingId=null; $('#f-title').value=''; $('#f-body').value=''; setThumb(null);
      $('#save').textContent='＋ 儲存筆記'; $('#cancel').style.display='none'; $('#flag').textContent='';
    }

    async function pickThumb(){
      var f=await JSTImg.pickFile(); if(!f) return;
      try{ var url=await JSTImg.resize(f); setThumb(url); toast('已選好縮圖'); }
      catch(e){ toast('❌ '+e.message); }
    }

    async function saveNote(){
      var title=$('#f-title').value.trim(), body=$('#f-body').value.trim();
      if(!title && !body){ toast('請先寫點東西'); $('#f-body').focus(); return; }
      var data={title:title,body:body,thumbnail:currentThumb||''};
      var btn=$('#save'); btn.disabled=true;
      try{
        if(editingId){
          await api('/api/items/'+editingId,{method:'PUT',body:JSON.stringify({data:data})});
          toast('✓ 已更新');
        }else{
          await api('/api/items',{method:'POST',body:JSON.stringify({kind:KIND,data:data})});
          toast('✓ 已存到雲端');
        }
        resetComposer(); reload();
      }catch(e){ toast('❌ '+e.message); }
      finally{ btn.disabled=false; }
    }

    $('#save').addEventListener('click',saveNote);
    $('#cancel').addEventListener('click',resetComposer);
    $('#search').addEventListener('input',render);
    $('#thumb-box').addEventListener('click',function(e){ if(e.target.id==='thumb-rm') return; pickThumb(); });
    $('#thumb-rm').addEventListener('click',function(e){ e.stopPropagation(); setThumb(null); });

    $('#list').addEventListener('click',async function(e){
      // 點縮圖開大圖
      var th = e.target.closest('.h-thumb.lb-clickable');
      if (th && th.dataset.thumb) { e.stopPropagation(); JSTLightbox.open([th.dataset.thumb]); return; }
      var item=e.target.closest('.h-item'); if(!item) return;
      var id=item.dataset.id; var it=cache.find(function(x){return x.id===id;}); if(!it) return;
      var d=it.data||{};
      if(e.target.classList.contains('edit')){
        editingId=id;
        $('#f-title').value=d.title||''; $('#f-body').value=d.body||''; setThumb(d.thumbnail||null);
        $('#save').textContent='✓ 更新筆記'; $('#cancel').style.display='inline-block'; $('#flag').textContent='編輯中…';
        window.scrollTo({top:0,behavior:'smooth'}); $('#f-title').focus();
      } else if(e.target.classList.contains('copy')){
        navigator.clipboard.writeText((d.title?d.title+'\n\n':'')+(d.body||'')).then(function(){toast('⧉ 已複製');});
      } else if(e.target.classList.contains('del')){
        if(!confirm('刪除這篇？所有人都會看不到。')) return;
        try{ await api('/api/items/'+id,{method:'DELETE'}); if(editingId===id) resetComposer(); reload(); toast('已刪除'); }
        catch(err){ toast('❌ '+err.message); }
      }
    });
  })();
  </script>
</body>
</html>
