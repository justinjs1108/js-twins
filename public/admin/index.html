<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>邀請碼管理 · JS_TWINS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;500;800;900&family=Hanken+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/bg-cyber.css" />
  <script src="/js/bg-cyber.js"></script>
  <script src="/js/guard.js"></script>
  <style>
    :root{--bg:#000;--text:#f4f4f4;--text-2:#a8a8ac;--muted:#6a6a70;--line:rgba(255,255,255,.14);--glass:rgba(255,255,255,.04);
      --fd:'Archivo',sans-serif;--fb:'Hanken Grotesk','PingFang TC','Noto Sans TC',system-ui,sans-serif;--fm:'JetBrains Mono',monospace;--danger:#ff6b6b;--ok:#5ed29c;--ease:cubic-bezier(.2,.7,.2,1)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;-webkit-font-smoothing:antialiased}
    header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:22px clamp(20px,5vw,72px);border-bottom:1px solid var(--line)}
    .back{font-family:var(--fm);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-2);text-decoration:none}
    .back:hover{color:#fff}
    .who{font-family:var(--fm);font-size:11.5px;color:var(--muted);letter-spacing:.06em}
    .logout{font-family:var(--fm);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-2);background:none;border:1px solid var(--line);border-radius:999px;padding:7px 14px;cursor:pointer}
    .logout:hover{color:#fff;border-color:rgba(255,255,255,.4)}
    .wrap{max-width:820px;margin:0 auto;padding:0 clamp(20px,5vw,72px) 100px}
    .hero{padding:50px 0 26px}
    .hero .no{font-family:var(--fm);font-size:12px;letter-spacing:.3em;color:var(--muted)}
    .hero h1{font-family:var(--fd);font-weight:900;font-size:clamp(34px,6vw,60px);letter-spacing:-.02em;margin:10px 0 8px}
    .hero p{color:var(--text-2);font-size:15px;max-width:560px;line-height:1.7}
    .add{display:flex;gap:10px;margin:10px 0 26px;flex-wrap:wrap}
    .add input{flex:1;min-width:200px;background:rgba(0,0,0,.4);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:13px 15px;font-size:15px;font-family:inherit}
    .add input:focus{outline:none;border-color:rgba(255,255,255,.45)}
    .btn{font-family:var(--fm);font-size:13px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;cursor:pointer;border:1px solid #fff;background:#fff;color:#000;border-radius:10px;padding:13px 20px}
    .btn:hover{box-shadow:0 0 22px rgba(255,255,255,.28)}
    .btn:disabled{opacity:.5;cursor:progress}
    .list{display:grid;gap:8px}
    .row{display:grid;grid-template-columns:1fr auto auto;gap:14px;align-items:center;padding:14px 16px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.02);transition:border-color .2s}
    .row:hover{border-color:rgba(255,255,255,.32)}
    .row.revoked{opacity:.45}
    .meta{display:flex;flex-direction:column;gap:4px;min-width:0}
    .lbl{font-family:var(--fb);font-size:14.5px;color:var(--text)}
    .lbl .tag{display:inline-block;font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted);margin-left:8px;vertical-align:1px}
    .lbl .tag.admin{color:#000;background:#fff;border-color:#fff}
    .lbl .tag.rev{color:var(--danger);border-color:rgba(255,107,107,.5)}
    .sub{font-family:var(--fm);font-size:11px;color:var(--muted);letter-spacing:.04em}
    .code-pill{font-family:var(--fm);font-size:14px;letter-spacing:3px;color:#fff;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:8px;padding:8px 12px;white-space:nowrap}
    .acts{display:flex;gap:6px}
    .iconbtn{font-family:var(--fm);font-size:11px;letter-spacing:.08em;color:var(--text-2);background:none;border:1px solid var(--line);border-radius:8px;padding:6px 11px;cursor:pointer}
    .iconbtn:hover{color:#fff;border-color:rgba(255,255,255,.4)}
    .iconbtn.danger:hover{color:var(--danger);border-color:var(--danger)}
    .iconbtn:disabled{opacity:.35;cursor:not-allowed}
    .msg{font-size:13px;margin:14px 0;min-height:18px}.msg.err{color:var(--danger)}.msg.ok{color:var(--ok)}
    .gate{padding:80px clamp(20px,5vw,72px);text-align:center;color:var(--muted)}
    .hidden{display:none}
    .empty{color:var(--muted);font-size:13px;padding:30px;text-align:center;border:1px dashed var(--line);border-radius:10px}
    .toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);background:#fff;color:#000;font-family:var(--fm);font-size:12.5px;letter-spacing:.08em;padding:11px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:all .3s var(--ease);z-index:50}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:560px){ .row{grid-template-columns:1fr;gap:10px} .code-pill{width:fit-content} }
  </style>
</head>
<body>
  <header>
    <a class="back" href="/">← JS_TWINS</a>
    <div style="display:flex;align-items:center;gap:14px">
      <span class="who" id="who"></span>
      <button class="logout" id="logout">登出</button>
    </div>
  </header>

  <div id="gate" class="gate">驗證中…</div>

  <div id="app" class="wrap hidden">
    <div class="hero">
      <span class="no">ADMIN · 邀請碼</span>
      <h1>誰能用這個平台</h1>
      <p>替你想分享的人產生一組邀請碼，把代碼用 LINE / Messenger 給他，他打開登入頁貼上就能進。隨時可以撤銷。</p>
    </div>
    <div class="add">
      <input id="label" type="text" placeholder="幫這組代碼取個名字，例如：給小王" />
      <button class="btn" id="add">＋ 產生邀請碼</button>
    </div>
    <p class="msg" id="msg"></p>
    <div class="list" id="list"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (function(){
    var $=function(s){return document.querySelector(s);};
    var me=null;
    function msg(t,cls){var m=$('#msg');if(!m)return;m.textContent=t||'';m.className='msg'+(cls?' '+cls:'');}
    function toast(m){var t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show');},1600);}

    function start(d){
      me=d;
      $('#who').textContent='👤 '+d.user;
      if(!d.isAdmin){ $('#gate').textContent='你不是管理員，沒有權限管理邀請碼。'; return; }
      $('#gate').classList.add('hidden'); $('#app').classList.remove('hidden');
      load();
    }
    document.addEventListener('jstwins-auth',function(e){start(e.detail);});
    if(window.__USER__) start(window.__USER__);

    function fmtDate(s){ if(!s) return '從未使用'; var d=new Date(s); return d.toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }

    function load(){
      fetch('/api/admin/codes',{credentials:'same-origin'}).then(function(r){return r.json();}).then(function(d){
        if(d.error){ msg(d.error,'err'); return; }
        render(d.list||[]);
      });
    }
    function render(list){
      var box=$('#list');
      if(!list.length){ box.innerHTML='<div class="empty">還沒有任何邀請碼。在上面取個名字、按產生。</div>'; return; }
      box.innerHTML=list.map(function(it){
        var tag=it.is_admin?'<span class="tag admin">管理員</span>':(it.revoked?'<span class="tag rev">已撤銷</span>':'');
        var lastUsed=it.last_used_at?'上次使用：'+fmtDate(it.last_used_at):'從未使用';
        return '<div class="row'+(it.revoked?' revoked':'')+'">'+
          '<div class="meta"><div class="lbl">'+escapeHtml(it.label)+tag+'</div><div class="sub">建立：'+fmtDate(it.created_at)+' · '+lastUsed+'</div></div>'+
          '<div class="code-pill">'+it.code+'</div>'+
          '<div class="acts">'+
            '<button class="iconbtn copy" data-code="'+it.code+'">⧉ 複製</button>'+
            (it.revoked
              ? '<button class="iconbtn danger del" data-code="'+it.code+'">刪除</button>'
              : '<button class="iconbtn danger rev" data-code="'+it.code+'"'+(it.is_admin?' disabled title="不能撤銷管理員自己"':'')+'>撤銷</button>')+
          '</div>'+
        '</div>';
      }).join('');
      box.querySelectorAll('.copy').forEach(function(b){ b.addEventListener('click',function(){ navigator.clipboard.writeText(b.dataset.code).then(function(){toast('⧉ 已複製：'+b.dataset.code);}); }); });
      box.querySelectorAll('.rev').forEach(function(b){ b.addEventListener('click',function(){ revoke(b.dataset.code); }); });
      box.querySelectorAll('.del').forEach(function(b){ b.addEventListener('click',function(){ del(b.dataset.code); }); });
    }
    function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function addCode(){
      var input=$('#label'); var label=input.value.trim();
      if(!label){ msg('請先取個名字（例如：給小王）','err'); return; }
      var btn=$('#add'); btn.disabled=true;
      fetch('/api/admin/codes',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({label:label})})
        .then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d};});})
        .then(function(x){ if(!x.ok) throw new Error(x.d.error||'產生失敗');
          input.value=''; msg('✓ 已產生「'+x.d.label+'」的代碼：'+x.d.code+'　已自動複製到剪貼簿','ok');
          try{ navigator.clipboard.writeText(x.d.code); }catch(e){}
          load(); })
        .catch(function(e){ msg(e.message,'err'); })
        .finally(function(){ btn.disabled=false; });
    }
    function revoke(code){
      if(!confirm('撤銷 '+code+' ？對方將無法再用這組代碼登入。')) return;
      fetch('/api/admin/codes/revoke',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({code:code})})
        .then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d};});})
        .then(function(x){ if(!x.ok) throw new Error(x.d.error||'撤銷失敗'); msg('已撤銷','ok'); load(); })
        .catch(function(e){ msg(e.message,'err'); });
    }
    function del(code){
      if(!confirm('永久刪除 '+code+' ？')) return;
      fetch('/api/admin/codes',{method:'DELETE',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({code:code})})
        .then(function(r){return r.json().then(function(d){return {ok:r.ok,d:d};});})
        .then(function(x){ if(!x.ok) throw new Error(x.d.error||'刪除失敗'); msg('已刪除','ok'); load(); })
        .catch(function(e){ msg(e.message,'err'); });
    }
    $('#add').addEventListener('click',addCode);
    $('#label').addEventListener('keydown',function(e){if(e.key==='Enter')addCode();});
    $('#logout').addEventListener('click',function(){
      try{ localStorage.removeItem('jst-code'); }catch(e){}
      fetch('/api/auth/logout',{method:'POST',credentials:'same-origin'}).then(function(){ location.href='/login/'; });
    });
  })();
  </script>
</body>
</html>
