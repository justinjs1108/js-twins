<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt 整理 · JS_TWINS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;500;800;900&family=Hanken+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tool.css" />
  <link rel="stylesheet" href="/css/lightbox.css" />
  <script src="/js/guard.js"></script>
  <script src="/js/img.js"></script>
  <script src="/js/lightbox.js"></script>
  <style>
    .tabs{display:inline-flex;gap:4px;background:rgba(0,0,0,.4);border:1px solid var(--line);border-radius:999px;padding:5px;margin-bottom:14px}
    .tab{font-family:var(--fm);font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;border:0;background:none;color:var(--text-2);padding:10px 20px;border-radius:999px;cursor:pointer;transition:all .25s var(--ease)}
    .tab.on{background:#fff;color:#000;font-weight:500}
    .tab .c{opacity:.5;margin-left:7px}
    .editing-flag{font-family:var(--fm);font-size:11.5px;letter-spacing:.1em;color:var(--muted);min-width:0;flex:1}

    /* ── Composer 多張圖片 ── */
    .imgs-strip{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .imgs-strip .img-cell{position:relative;width:96px;height:72px;border-radius:8px;overflow:hidden;border:1px solid var(--line);background:rgba(0,0,0,.4)}
    .imgs-strip .img-cell img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in}
    .imgs-strip .img-cell .x{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.75);border:1px solid var(--line);color:#fff;font-size:12px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .imgs-strip .add-cell{width:96px;height:72px;border-radius:8px;border:1.5px dashed var(--line);display:grid;place-items:center;cursor:pointer;color:var(--muted);font-family:var(--fm);font-size:11px;letter-spacing:.06em;line-height:1.5;text-align:center;transition:all .18s}
    .imgs-strip .add-cell:hover{color:#fff;border-color:rgba(255,255,255,.4)}

    /* ── 麵包屑 / 大標 ── */
    .crumb-block{margin:32px 0 22px}
    .crumb-root .title{font-family:var(--fd);font-weight:900;font-size:clamp(28px,3.4vw,42px);letter-spacing:-.02em;color:#fff;line-height:1.1;display:flex;align-items:center;gap:14px}
    .crumb-root .title .ico{font-size:.8em;opacity:.85}
    .crumb-root .sub{font-family:var(--fm);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:10px;padding-left:2px}
    .crumb-back{display:inline-flex;align-items:center;gap:12px;font-family:var(--fm);font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text);background:linear-gradient(180deg,#1c1c20,#060607);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:11px 22px 11px 16px;cursor:pointer;transition:all .25s var(--ease);text-decoration:none;box-shadow:inset 0 1px 1px rgba(255,255,255,.12),0 4px 14px rgba(0,0,0,.5)}
    .crumb-back:hover{transform:translateX(-2px);border-color:rgba(255,255,255,.35);box-shadow:inset 0 1px 1px rgba(255,255,255,.2),0 8px 22px rgba(0,0,0,.6),0 0 18px rgba(255,255,255,.08)}
    .crumb-back .arr{display:grid;place-items:center;width:24px;height:24px;border-radius:50%;border:1px solid rgba(255,255,255,.25);font-size:13px;color:#fff;background:rgba(255,255,255,.04)}
    .crumb-folder{margin-top:22px;display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;padding-bottom:18px;border-bottom:1px solid var(--line)}
    .crumb-folder .name{font-family:var(--fd);font-weight:900;font-size:clamp(28px,3.4vw,40px);letter-spacing:-.02em;color:#fff;line-height:1.1;display:flex;align-items:center;gap:12px}
    .crumb-folder .cnt{font-family:var(--fm);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}

    /* ── 工具列：排序 / 大小 ── */
    .toolbar-2{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin:0 0 16px}
    .toolbar-2 .sp{flex:1}
    .sort-sel{font-family:var(--fm);font-size:12px;letter-spacing:.06em;background:rgba(0,0,0,.4);color:var(--text);border:1px solid var(--line);border-radius:999px;padding:9px 14px;cursor:pointer}
    .sort-sel:focus{outline:none;border-color:rgba(255,255,255,.4)}
    .size-ctrl{display:flex;align-items:center;gap:10px;font-family:var(--fm);font-size:10.5px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
    .size-ctrl .ic{font-size:12px;line-height:1}.size-ctrl .ic.big{font-size:18px}
    .size-ctrl input[type=range]{appearance:none;-webkit-appearance:none;width:140px;height:3px;background:rgba(255,255,255,.18);border-radius:999px;outline:none;cursor:pointer}
    .size-ctrl input[type=range]::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;border:0;cursor:pointer;transition:transform .15s}
    .size-ctrl input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
    .size-ctrl input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#fff;border:0;cursor:pointer}

    /* ── 網格 ── */
    .grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fill,minmax(var(--card-min,240px),1fr));transition:grid-template-columns .25s var(--ease)}

    /* ── 資料夾卡（會顯示縮圖 + 左右切換 + 名稱旁編輯）── */
    .card-folder{border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.01));overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:border-color .25s,transform .25s,box-shadow .25s;position:relative}
    .card-folder:hover{border-color:rgba(255,255,255,.4);transform:translateY(-3px);box-shadow:0 14px 32px rgba(0,0,0,.5)}
    .card-folder .fd-thumb{width:100%;aspect-ratio:4/3;background:rgba(0,0,0,.55) center/cover no-repeat;position:relative;display:block}
    .card-folder .fd-thumb.empty{display:grid;place-items:center;background:repeating-linear-gradient(45deg,rgba(255,255,255,.018) 0 12px,rgba(255,255,255,.038) 12px 24px)}
    .card-folder .fd-thumb.empty svg{width:46%;height:46%;color:#fff;opacity:.78}
    .card-folder .fd-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.78);color:#fff;font-family:var(--fm);font-size:10.5px;letter-spacing:.1em;padding:5px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;gap:6px}
    .card-folder .fd-badge svg{width:13px;height:13px;color:#fff}
    .card-folder .fd-cnt{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.78);color:#fff;font-family:var(--fm);font-size:10.5px;letter-spacing:.06em;padding:5px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.2)}
    .card-folder .fd-arr{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .18s;line-height:1;font-family:var(--fm);user-select:none}
    .card-folder:hover .fd-arr.show{display:flex}
    .card-folder .fd-arr:hover{background:#fff;color:#000}
    .card-folder .fd-prev{left:10px}
    .card-folder .fd-next{right:10px}
    .card-folder .fd-body{padding:14px 16px 14px;display:flex;align-items:center;gap:10px}
    .card-folder .fd-name-wrap{flex:1;min-width:0;display:flex;align-items:center;gap:8px}
    .card-folder .fd-name{font-family:var(--fd);font-weight:800;font-size:16px;letter-spacing:-.005em;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-folder .fd-name-input{font-family:var(--fd);font-weight:800;font-size:16px;letter-spacing:-.005em;color:#fff;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.35);border-radius:6px;padding:4px 8px;flex:1;min-width:0;outline:none}
    .card-folder .fd-name-input:focus{border-color:#fff}
    .card-folder .fd-edit{flex:0 0 auto;width:28px;height:28px;display:grid;place-items:center;border:0;background:rgba(255,255,255,.05);color:var(--muted);border-radius:50%;cursor:pointer;font-size:13px;transition:all .18s}
    .card-folder .fd-edit:hover{background:rgba(255,255,255,.14);color:#fff}
    .card-folder .fd-del{flex:0 0 auto;width:28px;height:28px;display:grid;place-items:center;border:0;background:rgba(255,255,255,.05);color:var(--muted);border-radius:50%;cursor:pointer;font-size:13px;transition:all .18s}
    .card-folder .fd-del:hover{background:rgba(255,107,107,.18);color:#ff6b6b}
    .card-folder .fd-go{font-family:var(--fm);font-size:11px;color:var(--muted);letter-spacing:.06em;flex:0 0 auto}

    /* 「＋ 新增資料夾」卡 */
    .card-add{border:1.5px dashed var(--line);border-radius:14px;background:transparent;cursor:pointer;display:grid;place-items:center;min-height:240px;transition:all .25s}
    .card-add:hover{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.02)}
    .card-add .ico{font-family:var(--fd);font-weight:300;font-size:42px;color:var(--muted);line-height:1;text-align:center}
    .card-add .lbl{font-family:var(--fm);font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:8px;text-align:center}
    .card-add:hover .ico,.card-add:hover .lbl{color:#fff}

    /* ── 提示詞卡片 ── */
    .card-v{border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.01));overflow:hidden;display:flex;flex-direction:column;transition:border-color .25s,transform .25s,box-shadow .25s;position:relative}
    .card-v:hover{border-color:rgba(255,255,255,.4);transform:translateY(-3px);box-shadow:0 14px 32px rgba(0,0,0,.5)}
    .card-v .cv-thumb{width:100%;aspect-ratio:4/3;background:rgba(0,0,0,.55) center/cover no-repeat;position:relative;cursor:zoom-in;display:block}
    .card-v .cv-thumb.empty{display:grid;place-items:center;color:var(--muted);font-family:var(--fm);font-size:11px;letter-spacing:.16em;text-transform:uppercase;background:repeating-linear-gradient(135deg,rgba(255,255,255,.02) 0 10px,rgba(255,255,255,.04) 10px 20px);cursor:default}
    .card-v .cv-cnt{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;font-family:var(--fm);font-size:10.5px;letter-spacing:.06em;padding:3px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.18)}
    .card-v .cv-body{padding:14px 16px 4px}
    .card-v .cv-name{font-family:var(--fd);font-weight:800;font-size:16px;letter-spacing:-.005em;line-height:1.3;color:var(--text)}
    .card-v .cv-name.empty{color:var(--muted);font-weight:500;font-style:italic}
    .card-v .cv-meta{font-family:var(--fm);font-size:10.5px;color:var(--muted);margin-top:4px;letter-spacing:.04em;display:flex;justify-content:space-between;gap:6px}
    .card-v .cv-tags{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0 0;align-items:center}
    .card-v .cv-tags .chip{font-family:var(--fm);font-size:10.5px;color:var(--text-2);border:1px solid var(--line);border-radius:999px;padding:2px 8px}
    .card-v .cv-acts{padding:10px 14px 14px;display:flex;gap:6px;margin-top:auto}
    .card-v .cv-acts .btn{flex:1;padding:8px 6px;font-size:11px;letter-spacing:.06em}
    .card-v .cv-acts .btn.danger{flex:0 0 auto;padding:8px 10px}
    .card-v .cv-acts .btn.move{flex:0 0 auto;padding:8px 12px}

    /* ── 重複偵測警告 ── */
    .dup-warn{background:rgba(255,200,80,.06);border:1px solid rgba(255,200,80,.4);border-radius:10px;padding:14px 16px;margin-top:14px;display:none}
    .dup-warn .dup-head{font-family:var(--fm);font-size:12px;color:#ffd96b;letter-spacing:.06em;margin-bottom:10px;line-height:1.5}
    .dup-warn .dup-head b{color:#fff}
    .dup-warn .dup-list{display:flex;flex-direction:column;gap:6px}
    .dup-warn .dup-item{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.32);padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.08);flex-wrap:wrap}
    .dup-warn .dup-param{font-family:var(--fm);font-size:11.5px;color:#ffeb91;background:rgba(0,0,0,.5);padding:3px 9px;border-radius:5px;letter-spacing:.04em}
    .dup-warn .dup-loc{font-family:var(--fb);font-size:13px;color:var(--text-2);flex:1;min-width:0}
    .dup-warn .dup-loc b{color:#fff;font-weight:600}
    .dup-warn .dup-item .btn{flex:0 0 auto;padding:6px 12px;font-size:11px}

    /* 卡片被導引時短暫高亮 */
    .card-v.highlight,.card-folder.highlight{box-shadow:0 0 0 2px #ffd96b,0 0 30px rgba(255,217,107,.4)!important;border-color:#ffd96b!important}

    /* ── Modal ── */
    .modal-bg{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:grid;place-items:center;padding:20px;animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal-box{width:100%;max-width:420px;border:1px solid var(--line);border-radius:14px;background:#0a0a0c;padding:24px;box-shadow:0 30px 80px rgba(0,0,0,.7)}
    .modal-box h3{font-family:var(--fd);font-weight:800;font-size:18px;letter-spacing:.01em;margin-bottom:14px;color:#fff}
    .modal-box label{font-family:var(--fm);font-size:11px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px;display:block}
    .modal-box input,.modal-box select{width:100%;background:rgba(0,0,0,.4);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;margin-bottom:12px}
    .modal-box select option{background:#0a0a0a}
    .modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
  </style>
</head>
<body>
  <header class="nav">
    <a class="back" href="/">← JS_TWINS</a>
    <span class="h-title">02 · Prompt Vault</span>
    <div class="h-right">
      <span class="who" id="who"></span>
      <span class="cloud" id="cloud">● 連線中…</span>
    </div>
  </header>

  <main class="wrap">
    <div class="hero">
      <span class="no">02 / PROMPT VAULT</span>
      <h1>Prompt 整理</h1>
      <p>把提示詞用<b style="color:#fff">資料夾</b>分類好：點資料夾進去看裡面的內容、可以多張圖、點圖看大圖。</p>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab on" data-tab="mj">Midjourney<span class="c" id="c-mj">0</span></button>
      <button class="tab" data-tab="nb">Nano Banana<span class="c" id="c-nb">0</span></button>
    </div>

    <!-- Composer -->
    <section class="panel">
      <label>名稱 / 標題</label>
      <input id="f-title" type="text" placeholder="例如：賽博龐克下雨夜街景" />

      <div id="folder-field">
        <label class="block">所屬資料夾</label>
        <select id="f-folder">
          <option value="">未分類</option>
        </select>
      </div>

      <label class="block">提示詞</label>
      <textarea id="f-text" rows="5" placeholder="把提示詞貼在這裡…"></textarea>

      <label class="block">標籤（用逗號分隔，可留空）</label>
      <input id="f-tags" type="text" placeholder="例如：cyberpunk, night, neon" />

      <label class="block">圖片（可上傳<b style="color:#fff">多張</b>，第一張會當主圖）</label>
      <div class="imgs-strip" id="imgs-strip">
        <div class="add-cell" id="add-img">📷<br>新增圖片</div>
      </div>

      <!-- 重複偵測：MJ 才出現 -->
      <div class="dup-warn" id="dup-warn"></div>

      <div class="actions">
        <span class="editing-flag" id="flag"></span>
        <button id="cancel" class="btn ghost sm" style="display:none">取消編輯</button>
        <button id="save" class="btn primary">＋ 儲存提示詞</button>
      </div>
    </section>

    <!-- 大標 / 返回 -->
    <div class="crumb-block" id="crumb"></div>

    <!-- 工具列：排序 / 大小（無搜尋） -->
    <div class="toolbar-2">
      <select id="sort" class="sort-sel">
        <option value="new">最新優先</option>
        <option value="old">最舊優先</option>
        <option value="az">名稱 A→Z</option>
        <option value="za">名稱 Z→A</option>
      </select>
      <div class="sp"></div>
      <div class="size-ctrl" title="調整縮圖大小">
        <span class="ic">▫</span>
        <input id="size" type="range" min="160" max="420" step="10" value="240" />
        <span class="ic big">▪</span>
      </div>
      <span id="count" class="stat" style="font-family:var(--fm);font-size:11.5px;color:var(--muted)"></span>
    </div>

    <div class="grid" id="list"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
  (function(){
    var $=function(s){return document.querySelector(s);};
    var tab='mj';
    var KIND={mj:'prompt-mj',nb:'prompt-nb'};
    var cache={mj:[],nb:[]};
    var folders=[];          // [{id, label, scope}]  scope: 'mj' or 'nb'
    var editingId=null;
    var currentImgs=[];      // base64 array for composer
    var view='root';         // 'root' or 'folder'
    var viewFolderId=null;   // folder id or '__none__' (未分類)
    var sortKey='new';
    var folderPrev={};       // {folderId: previewIndex}

    var FOLDER_SVG_SMALL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>';
    var FOLDER_SVG_BIG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/><path d="M3 9.5h18"/></svg>';

    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function regEsc(s){return String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

    // ── 重複偵測：掃描 MJ 常見「身份識別」參數 ──
    var DUP_PARAMS = ['--profile','--sref','--cref','--p','--seed'];
    function extractParams(text){
      var found = {}; // param -> [values]
      DUP_PARAMS.forEach(function(p){
        var re = new RegExp(p.replace('-','\\-') + '\\s+(\\S+)', 'gi');
        var m; var vals = [];
        while ((m = re.exec(text)) !== null){
          var v = m[1];
          if (v && v.length>2 && v.length<200) vals.push(v);
        }
        if (vals.length) found[p] = vals;
      });
      return found;
    }
    function findDuplicates(text){
      if (tab !== 'mj') return [];
      var params = extractParams(text);
      var matches = [];
      Object.keys(params).forEach(function(p){
        params[p].forEach(function(v){
          (cache.mj || []).forEach(function(it){
            if (it.id === editingId) return;
            var t = (it.data && it.data.text) || '';
            var re = new RegExp(p.replace('-','\\-') + '\\s+' + regEsc(v) + '(\\b|$)', 'i');
            if (re.test(t)) matches.push({ param: p, value: v, prompt: it });
          });
        });
      });
      return matches;
    }
    function renderDupWarn(){
      var box = $('#dup-warn');
      if (!box) return;
      if (tab !== 'mj') { box.style.display='none'; return; }
      var text = $('#f-text').value;
      if (!text || !text.trim()) { box.style.display='none'; return; }
      var matches = findDuplicates(text);
      if (!matches.length) { box.style.display='none'; return; }
      // 用 (promptId + param + value) 去重
      var seen={}, uniq=[];
      matches.forEach(function(m){
        var k = m.prompt.id + '|' + m.param + '|' + m.value;
        if (seen[k]) return; seen[k]=true; uniq.push(m);
      });
      box.style.display='';
      box.innerHTML =
        '<div class="dup-head">⚠️ 這個提示詞裡有 <b>' + uniq.length + ' 個參數</b>之前已經記錄過。仍可儲存，但建議先確認是否重複：</div>' +
        '<div class="dup-list">' + uniq.map(function(m){
          var d = m.prompt.data || {};
          var title = d.title || '未命名';
          var fid = d.folder || '';
          var fname = fid ? folderLabel(fid) : '未分類';
          return '<div class="dup-item">' +
            '<span class="dup-param">' + esc(m.param + ' ' + m.value) + '</span>' +
            '<span class="dup-loc">於 <b>' + esc(fname) + '</b> / <b>' + esc(title) + '</b></span>' +
            '<button class="btn sm" data-go="' + m.prompt.id + '">查看</button>' +
            '</div>';
        }).join('') + '</div>';
      // 綁定「查看」按鈕
      box.querySelectorAll('[data-go]').forEach(function(b){
        b.addEventListener('click', function(){ gotoPrompt(b.dataset.go); });
      });
    }
    function gotoPrompt(promptId){
      var p = (cache.mj || []).find(function(x){ return x.id === promptId; });
      if (!p) return;
      var fid = (p.data && p.data.folder) || '__none__';
      view = 'folder'; viewFolderId = fid;
      renderCrumb(); render();
      setTimeout(function(){
        var card = document.querySelector('.card-v[data-id="' + promptId + '"]');
        if (card){
          card.scrollIntoView({ behavior:'smooth', block:'center' });
          card.classList.add('highlight');
          setTimeout(function(){ card.classList.remove('highlight'); }, 2400);
        }
      }, 160);
    }
    function toast(m){var t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show');},1800);}

    document.addEventListener('jstwins-auth',function(e){
      $('#who').textContent='👤 '+e.detail.user;
      $('#cloud').textContent='● 雲端已連線';$('#cloud').classList.add('live');
      reloadAll();
    });

    async function api(path,opts){
      opts=opts||{}; opts.credentials='same-origin';
      opts.headers=Object.assign({'Content-Type':'application/json'},opts.headers||{});
      var r=await fetch(path,opts); var d=await r.json();
      if(!r.ok) throw new Error(d.error||'HTTP '+r.status);
      return d;
    }

    async function reloadAll(){
      try{
        var fRes = await api('/api/items?kind=folder');
        var raw = fRes.items||[];
        var mj = await api('/api/items?kind='+KIND.mj);
        var nb = await api('/api/items?kind='+KIND.nb);
        cache.mj = mj.items||[];
        cache.nb = nb.items||[];

        // 自動把舊的資料夾（沒 scope 的）依使用狀況遷移到 MJ 或 NB
        var legacy = raw.filter(function(it){ return !(it.data && it.data.scope); });
        if (legacy.length){
          for (var i=0; i<legacy.length; i++){
            var fid = legacy[i].id;
            var mjN = cache.mj.filter(function(p){ return p.data && p.data.folder === fid; }).length;
            var nbN = cache.nb.filter(function(p){ return p.data && p.data.folder === fid; }).length;
            var scope = (nbN > mjN) ? 'nb' : 'mj';
            var newData = Object.assign({}, legacy[i].data||{}, { scope: scope });
            try {
              await api('/api/items/'+fid,{method:'PUT',body:JSON.stringify({data:newData})});
              legacy[i].data = newData;
            } catch(e){}
          }
        }

        folders = raw.map(function(it){ return {
          id: it.id,
          label: (it.data&&it.data.label)||'未命名資料夾',
          scope: (it.data&&it.data.scope)||'mj'
        }; });
        $('#c-mj').textContent = cache.mj.length;
        $('#c-nb').textContent = cache.nb.length;
        renderFolderSelect();
        renderCrumb();
        render();
      }catch(e){
        $('#list').innerHTML='<div class="h-empty" style="grid-column:1/-1">載入失敗：'+esc(e.message)+'</div>';
      }
    }

    // 只回傳目前分頁（MJ 或 NB）的資料夾
    function currentFolders(){
      return folders.filter(function(f){ return f.scope === tab; });
    }

    function getImages(d){
      if (Array.isArray(d.images) && d.images.length) return d.images;
      if (d.thumbnail) return [d.thumbnail];
      return [];
    }

    function getFolderPreviews(folderId){
      // 拿這個資料夾裡每一筆 prompt 的第一張圖
      var arr = cache[tab]||[];
      var ids = arr.filter(function(it){
        var fid = (it.data&&it.data.folder) || '__none__';
        return fid === folderId;
      });
      var imgs = [];
      ids.forEach(function(it){
        var ims = getImages(it.data||{});
        if (ims.length) imgs.push(ims[0]);
      });
      return imgs;
    }

    function renderFolderSelect(){
      var field = $('#folder-field');
      if (tab !== 'mj') { field.style.display = 'none'; return; }
      field.style.display = '';
      var sel = $('#f-folder');
      sel.innerHTML = '<option value="">未分類</option>' +
        currentFolders().map(function(f){ return '<option value="'+esc(f.id)+'">'+esc(f.label)+'</option>'; }).join('');
    }

    function folderLabel(id){
      if(!id || id==='__none__') return '未分類';
      var f = folders.find(function(x){return x.id===id;});
      return f ? f.label : '未分類';
    }

    function renderCrumb(){
      var box = $('#crumb');
      // Nano Banana：無資料夾，顯示簡單標題
      if (tab === 'nb') {
        box.innerHTML =
          '<div class="crumb-root">'+
            '<div class="title"><span class="ico">'+FOLDER_SVG_BIG+'</span><span>Nano Banana · 全部 Prompt</span></div>'+
            '<div class="sub">所有提示詞</div>'+
          '</div>';
        return;
      }
      if (view==='root'){
        box.innerHTML =
          '<div class="crumb-root">'+
            '<div class="title"><span class="ico">'+FOLDER_SVG_BIG+'</span><span>全部資料夾</span></div>'+
            '<div class="sub">點下方資料夾進入查看</div>'+
          '</div>';
      } else {
        var lbl = folderLabel(viewFolderId);
        var arr = cache[tab]||[];
        var n = arr.filter(function(it){
          var fid = (it.data&&it.data.folder)||'__none__';
          return fid===viewFolderId;
        }).length;
        box.innerHTML =
          '<button class="crumb-back" id="crumb-back" type="button"><span class="arr">←</span>回到全部資料夾</button>'+
          '<div class="crumb-folder">'+
            '<div class="name">'+FOLDER_SVG_BIG+'<span>'+esc(lbl)+'</span></div>'+
            '<div class="cnt">'+n+' 筆內容</div>'+
          '</div>';
        var bk = $('#crumb-back'); if(bk) bk.addEventListener('click', goRoot);
      }
    }

    function goRoot(){
      view='root'; viewFolderId=null;
      renderCrumb(); render();
      window.scrollTo({top:$('#crumb').offsetTop-80,behavior:'smooth'});
    }
    function enterFolder(id){
      view='folder'; viewFolderId=id;
      renderCrumb(); render();
      window.scrollTo({top:$('#crumb').offsetTop-80,behavior:'smooth'});
    }

    function sortFn(a,b){
      var da = a.data||{}, db = b.data||{};
      if (sortKey==='new') return new Date(b.updated_at||b.created_at) - new Date(a.updated_at||a.created_at);
      if (sortKey==='old') return new Date(a.updated_at||a.created_at) - new Date(b.updated_at||b.created_at);
      var ta = (da.title||'').toLowerCase(), tb = (db.title||'').toLowerCase();
      if (sortKey==='az') return ta.localeCompare(tb);
      if (sortKey==='za') return tb.localeCompare(ta);
      return 0;
    }

    function render(){
      var box=$('#list');

      // Nano Banana：直接顯示全部 prompt（不分資料夾）
      if (tab === 'nb') {
        var arr2 = (cache.nb||[]).slice();
        arr2.sort(sortFn);
        $('#count').textContent = arr2.length + ' 筆';
        if (!arr2.length) { box.innerHTML='<div class="h-empty" style="grid-column:1/-1">還沒有 Nano Banana 提示詞，從上面新增吧。</div>'; return; }
        box.innerHTML = arr2.map(function(it){
          var d=it.data||{};
          var imgs=getImages(d);
          var when=new Date(it.updated_at||it.created_at).toLocaleString('zh-TW',{month:'numeric',day:'numeric'});
          var by=it.created_by?esc(it.created_by):'';
          var tags=(d.tags||[]).slice(0,4).map(function(g){return '<span class="chip">'+esc(g)+'</span>';}).join('');
          var thumb = imgs.length
            ? '<div class="cv-thumb" data-id="'+it.id+'" style="background-image:url(\''+esc(imgs[0])+'\')" title="點擊看大圖">'+
                (imgs.length>1 ? '<div class="cv-cnt">▦ '+imgs.length+'</div>' : '')+
              '</div>'
            : '<div class="cv-thumb empty">無圖</div>';
          return '<div class="card-v" data-id="'+it.id+'">'+thumb+
            '<div class="cv-body">'+
              '<div class="cv-name'+(d.title?'':' empty')+'">'+esc(d.title||'未命名')+'</div>'+
              '<div class="cv-meta"><span>'+when+'</span><span>'+by+'</span></div>'+
              (tags?'<div class="cv-tags">'+tags+'</div>':'')+
            '</div>'+
            '<div class="cv-acts">'+
              '<button class="btn sm primary copy">⧉ 複製 Prompt</button>'+
              '<button class="btn sm edit">✎</button>'+
              '<button class="btn sm ghost danger del" title="刪除">✕</button>'+
            '</div>'+
          '</div>';
        }).join('');
        return;
      }

      if (view==='root'){
        // 列出所有資料夾：user folders 在前 → 未分類 → ＋ 新增
        var counts = { '__none__': 0 };
        currentFolders().forEach(function(f){ counts[f.id]=0; });
        (cache[tab]||[]).forEach(function(it){
          var fid = (it.data&&it.data.folder) || '__none__';
          counts[fid] = (counts[fid]||0) + 1;
        });

        var userList = currentFolders().slice().sort(function(a,b){ return (a.label||'').localeCompare(b.label||''); });

        var html = '';
        userList.forEach(function(f){
          html += folderCardHtml(f.id, f.label, counts[f.id]||0, false);
        });
        // 未分類 永遠最後（在新增之前）
        html += folderCardHtml('__none__', '未分類', counts['__none__']||0, true);
        // 新增
        html += '<button class="card-add" id="add-folder"><div><div class="ico">＋</div><div class="lbl">新增資料夾</div></div></button>';

        box.innerHTML = html;
        $('#count').textContent = (userList.length+1) + ' 個資料夾';

        // 綁定每張卡的事件
        box.querySelectorAll('.card-folder').forEach(function(card){
          var fid = card.dataset.fid;
          // 點卡進入（避開內部互動元件）
          card.addEventListener('click',function(e){
            if (e.target.closest('.fd-arr,.fd-edit,.fd-del,.fd-name-input')) return;
            enterFolder(fid);
          });
          // 左右切換縮圖
          var prevs = getFolderPreviews(fid);
          var prevBtn = card.querySelector('.fd-prev');
          var nextBtn = card.querySelector('.fd-next');
          if (prevs.length > 1) {
            if (prevBtn) prevBtn.classList.add('show');
            if (nextBtn) nextBtn.classList.add('show');
            if (prevBtn) prevBtn.addEventListener('click',function(e){
              e.stopPropagation();
              folderPrev[fid] = ((folderPrev[fid]||0) - 1 + prevs.length) % prevs.length;
              card.querySelector('.fd-thumb').style.backgroundImage = "url('"+prevs[folderPrev[fid]]+"')";
            });
            if (nextBtn) nextBtn.addEventListener('click',function(e){
              e.stopPropagation();
              folderPrev[fid] = ((folderPrev[fid]||0) + 1) % prevs.length;
              card.querySelector('.fd-thumb').style.backgroundImage = "url('"+prevs[folderPrev[fid]]+"')";
            });
          }
          // 改名
          var editBtn = card.querySelector('.fd-edit');
          if (editBtn) editBtn.addEventListener('click', function(e){
            e.stopPropagation();
            startInlineRename(card, fid);
          });
          // 刪除
          var delBtn = card.querySelector('.fd-del');
          if (delBtn) delBtn.addEventListener('click', function(e){
            e.stopPropagation();
            deleteFolder(fid);
          });
        });
        var addBtn = $('#add-folder');
        if (addBtn) addBtn.addEventListener('click', createFolder);
        return;
      }

      // 資料夾內：顯示該資料夾的 prompts
      var arr=(cache[tab]||[]).slice();
      if (viewFolderId==='__none__') arr = arr.filter(function(it){ return !(it.data&&it.data.folder); });
      else arr = arr.filter(function(it){ return (it.data&&it.data.folder)===viewFolderId; });
      var items = arr;
      items.sort(sortFn);
      $('#count').textContent = items.length + ' 筆';

      if(!items.length){
        box.innerHTML='<div class="h-empty" style="grid-column:1/-1">這個資料夾還沒有內容，從上面新增一筆吧。</div>';
        return;
      }
      box.innerHTML=items.map(function(it){
        var d=it.data||{};
        var imgs=getImages(d);
        var when=new Date(it.updated_at||it.created_at).toLocaleString('zh-TW',{month:'numeric',day:'numeric'});
        var by=it.created_by?esc(it.created_by):'';
        var tags=(d.tags||[]).slice(0,4).map(function(g){return '<span class="chip">'+esc(g)+'</span>';}).join('');
        var thumb = imgs.length
          ? '<div class="cv-thumb" data-id="'+it.id+'" style="background-image:url(\''+esc(imgs[0])+'\')" title="點擊看大圖">'+
              (imgs.length>1 ? '<div class="cv-cnt">▦ '+imgs.length+'</div>' : '')+
            '</div>'
          : '<div class="cv-thumb empty">無圖</div>';
        return '<div class="card-v" data-id="'+it.id+'">'+thumb+
          '<div class="cv-body">'+
            '<div class="cv-name'+(d.title?'':' empty')+'">'+esc(d.title||'未命名')+'</div>'+
            '<div class="cv-meta"><span>'+when+'</span><span>'+by+'</span></div>'+
            (tags?'<div class="cv-tags">'+tags+'</div>':'')+
          '</div>'+
          '<div class="cv-acts">'+
            '<button class="btn sm primary copy">⧉ 複製 Prompt</button>'+
            '<button class="btn sm move">移動</button>'+
            '<button class="btn sm edit">✎</button>'+
            '<button class="btn sm ghost danger del" title="刪除">✕</button>'+
          '</div>'+
        '</div>';
      }).join('');
    }

    function folderCardHtml(id, label, count, isUncat){
      var prevs = getFolderPreviews(id);
      var idx = folderPrev[id] || 0;
      if (idx >= prevs.length) { idx = 0; folderPrev[id] = 0; }
      var hasImg = prevs.length > 0;
      var thumbHtml = hasImg
        ? '<div class="fd-thumb" style="background-image:url(\''+esc(prevs[idx])+'\')">'+
            '<div class="fd-badge">'+FOLDER_SVG_SMALL+(isUncat?'未分類':'資料夾')+'</div>'+
            '<div class="fd-cnt">'+count+' 筆</div>'+
            '<button class="fd-arr fd-prev" type="button" title="上一張">‹</button>'+
            '<button class="fd-arr fd-next" type="button" title="下一張">›</button>'+
          '</div>'
        : '<div class="fd-thumb empty">'+FOLDER_SVG_BIG+
            '<div class="fd-badge">'+FOLDER_SVG_SMALL+(isUncat?'未分類':'資料夾')+'</div>'+
            '<div class="fd-cnt">'+count+' 筆</div>'+
          '</div>';
      var rightActs = '';
      if (!isUncat){
        rightActs = '<button class="fd-edit" type="button" title="改名">✎</button>' +
                    '<button class="fd-del" type="button" title="刪除">✕</button>';
      }
      return '<div class="card-folder'+(isUncat?' uncat':'')+'" data-fid="'+id+'" title="點擊進入">'+
        thumbHtml +
        '<div class="fd-body">'+
          '<div class="fd-name-wrap"><span class="fd-name">'+esc(label)+'</span></div>'+
          rightActs +
          '<span class="fd-go">›</span>'+
        '</div>'+
      '</div>';
    }

    // 名稱旁邊行內改名
    function startInlineRename(card, fid){
      var f = folders.find(function(x){return x.id===fid;}); if(!f) return;
      var wrap = card.querySelector('.fd-name-wrap');
      var nameSpan = card.querySelector('.fd-name');
      if (!wrap || !nameSpan) return;
      var inp = document.createElement('input');
      inp.type='text'; inp.className='fd-name-input'; inp.value=f.label;
      wrap.replaceChild(inp, nameSpan);
      inp.focus(); inp.select();
      var done=false;
      function commit(save){
        if (done) return; done=true;
        var val = inp.value.trim();
        // 回填顯示
        var span = document.createElement('span');
        span.className='fd-name';
        span.textContent = save ? (val || f.label) : f.label;
        wrap.replaceChild(span, inp);
        if (save && val && val !== f.label){
          // 保留原本 scope，只更新 label
          api('/api/items/'+fid,{method:'PUT',body:JSON.stringify({data:{label:val, scope:f.scope}})})
            .then(function(){ toast('✓ 已改名'); reloadAll(); })
            .catch(function(e){ toast('❌ '+e.message); reloadAll(); });
        }
      }
      inp.addEventListener('keydown',function(e){
        if(e.key==='Enter'){ e.preventDefault(); commit(true); }
        else if(e.key==='Escape'){ e.preventDefault(); commit(false); }
      });
      inp.addEventListener('blur',function(){ commit(true); });
      inp.addEventListener('click',function(e){ e.stopPropagation(); });
    }

    // ── Composer 多張圖 ──
    function renderImgsStrip(){
      var strip = $('#imgs-strip');
      var html = currentImgs.map(function(src, idx){
        return '<div class="img-cell"><img src="'+esc(src)+'" data-idx="'+idx+'" /><button class="x" data-rm="'+idx+'" type="button" title="移除">✕</button></div>';
      }).join('');
      html += '<div class="add-cell" id="add-img">📷<br>新增圖片</div>';
      strip.innerHTML = html;
      strip.querySelectorAll('img').forEach(function(im){
        im.addEventListener('click', function(){ JSTLightbox.open(currentImgs, parseInt(im.dataset.idx,10)); });
      });
      strip.querySelectorAll('.x').forEach(function(b){
        b.addEventListener('click', function(e){
          e.stopPropagation();
          var i = parseInt(b.dataset.rm, 10);
          currentImgs.splice(i, 1);
          renderImgsStrip();
        });
      });
      $('#add-img').addEventListener('click', pickImage);
    }
    async function pickImage(){
      var f = await JSTImg.pickFile(); if(!f) return;
      try {
        var url = await JSTImg.resize(f, 800, 600, 0.82);
        currentImgs.push(url);
        renderImgsStrip();
        toast('已加入第 '+currentImgs.length+' 張');
      } catch(e){ toast('❌ '+e.message); }
    }

    function resetComposer(){
      editingId=null; $('#f-title').value=''; $('#f-text').value=''; $('#f-tags').value='';
      $('#f-folder').value = (view==='folder' && viewFolderId!=='__none__') ? viewFolderId : '';
      currentImgs = [];
      renderImgsStrip();
      $('#save').textContent='＋ 儲存提示詞';
      $('#cancel').style.display='none';
      $('#flag').textContent='';
      $('#dup-warn').style.display='none';
    }

    async function saveItem(){
      var title=$('#f-title').value.trim();
      var text=$('#f-text').value.trim();
      if(!text){ toast('請貼提示詞'); $('#f-text').focus(); return; }
      var tags=$('#f-tags').value.split(',').map(function(s){return s.trim();}).filter(Boolean);
      var folder = (tab === 'mj') ? ($('#f-folder').value || '') : '';
      var data={ title:title, text:text, tags:tags, images: currentImgs.slice(), folder: folder };
      var btn=$('#save'); btn.disabled=true;
      try{
        if(editingId){
          await api('/api/items/'+editingId,{method:'PUT',body:JSON.stringify({data:data})});
          toast('✓ 已更新');
        }else{
          await api('/api/items',{method:'POST',body:JSON.stringify({kind:KIND[tab],data:data})});
          toast('✓ 已存到雲端');
        }
        resetComposer(); reloadAll();
      }catch(e){ toast('❌ '+e.message); }
      finally{ btn.disabled=false; }
    }

    // ── 資料夾管理（新增還是用 modal 比較清楚）──
    async function createFolder(){
      openModal({
        title: '新增資料夾',
        fields: [{ key:'label', label:'名稱', placeholder:'例如：恐怖寫實' }],
        okLabel: '建立',
        onOk: async function(v){
          var name = (v.label||'').trim();
          if (!name) { toast('請輸入名稱'); return false; }
          try{
            await api('/api/items',{method:'POST',body:JSON.stringify({kind:'folder',data:{label:name, scope: tab}})});
            toast('✓ 已建立資料夾「'+name+'」（'+(tab==='mj'?'Midjourney':'Nano Banana')+' 專用）');
            await reloadAll();
            return true;
          }catch(e){ toast('❌ '+e.message); return false; }
        }
      });
    }
    async function deleteFolder(id){
      var f = folders.find(function(x){return x.id===id;}); if(!f) return;
      var ownTab = f.scope || 'mj';
      var n = (cache[ownTab]||[]).filter(function(it){ return (it.data&&it.data.folder)===id; }).length;
      var msg = '刪除資料夾「'+f.label+'」？\n' + (n? '裡面的 '+n+' 筆提示詞會變成「未分類」（不會被刪掉）。' : '裡面是空的。');
      if (!confirm(msg)) return;
      try{
        if (n) {
          var promises = (cache[ownTab]||[])
            .filter(function(it){ return (it.data&&it.data.folder)===id; })
            .map(function(it){
              var d = Object.assign({}, it.data, { folder: '' });
              return api('/api/items/'+it.id,{method:'PUT',body:JSON.stringify({data:d})});
            });
          await Promise.all(promises);
        }
        await api('/api/items/'+id,{method:'DELETE'});
        toast('✓ 已刪除');
        if (viewFolderId===id) goRoot(); else await reloadAll();
      }catch(e){ toast('❌ '+e.message); }
    }
    async function moveItem(id){
      var arr=cache[tab]; var it=arr.find(function(x){return x.id===id;}); if(!it) return;
      openModal({
        title: '移動到資料夾',
        fields: [{ key:'folder', label:'資料夾', type:'select', value:(it.data&&it.data.folder)||'' }],
        okLabel: '移動',
        onOk: async function(v){
          var d = Object.assign({}, it.data||{}, { folder: v.folder||'' });
          try{
            await api('/api/items/'+id,{method:'PUT',body:JSON.stringify({data:d})});
            toast('✓ 已移動');
            await reloadAll();
            return true;
          }catch(e){ toast('❌ '+e.message); return false; }
        }
      });
    }

    function openModal(opts){
      var bg = document.createElement('div'); bg.className='modal-bg';
      var box = document.createElement('div'); box.className='modal-box';
      var html='<h3>'+esc(opts.title)+'</h3>';
      opts.fields.forEach(function(f){
        html += '<label>'+esc(f.label)+'</label>';
        if (f.type==='select') {
          html += '<select data-key="'+f.key+'"><option value="">未分類</option>' +
            currentFolders().map(function(ff){ return '<option value="'+esc(ff.id)+'"'+(ff.id===f.value?' selected':'')+'>'+esc(ff.label)+'</option>'; }).join('') + '</select>';
        } else {
          html += '<input type="text" data-key="'+f.key+'" value="'+esc(f.value||'')+'" placeholder="'+esc(f.placeholder||'')+'" />';
        }
      });
      html += '<div class="modal-acts"><button class="btn ghost sm" data-cancel>取消</button><button class="btn primary sm" data-ok>'+esc(opts.okLabel||'確定')+'</button></div>';
      box.innerHTML = html;
      bg.appendChild(box);
      document.body.appendChild(bg);

      function close(){ bg.remove(); }
      box.querySelector('[data-cancel]').addEventListener('click', close);
      bg.addEventListener('click', function(e){ if(e.target===bg) close(); });
      box.querySelector('[data-ok]').addEventListener('click', async function(){
        var vals = {};
        box.querySelectorAll('[data-key]').forEach(function(el){ vals[el.dataset.key] = el.value; });
        var ok = await opts.onOk(vals);
        if (ok !== false) close();
      });
      var first = box.querySelector('[data-key]'); if(first) first.focus();
    }

    // ── 事件 ──
    document.getElementById('tabs').addEventListener('click',function(e){
      var b=e.target.closest('.tab'); if(!b) return;
      tab=b.dataset.tab;
      document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('on',x===b);});
      goRoot(); resetComposer();
    });
    $('#save').addEventListener('click',saveItem);
    $('#cancel').addEventListener('click',resetComposer);
    $('#sort').addEventListener('change',function(e){ sortKey=e.target.value; render(); });

    // 即時偵測重複（debounce 300ms，避免每打一字都掃）
    var dupTimer;
    $('#f-text').addEventListener('input', function(){
      clearTimeout(dupTimer);
      dupTimer = setTimeout(renderDupWarn, 300);
    });

    (function(){
      var sizeInp=$('#size');
      var saved=localStorage.getItem('jst-pv-size');
      if(saved){ sizeInp.value=saved; document.documentElement.style.setProperty('--card-min', saved+'px'); }
      sizeInp.addEventListener('input',function(e){
        var v=e.target.value;
        document.documentElement.style.setProperty('--card-min', v+'px');
        localStorage.setItem('jst-pv-size', v);
      });
    })();

    // 列表點擊（資料夾內的 prompt 卡片）
    $('#list').addEventListener('click',async function(e){
      var thumb = e.target.closest('.cv-thumb');
      if (thumb && !thumb.classList.contains('empty')){
        var id = thumb.dataset.id;
        var it = (cache[tab]||[]).find(function(x){return x.id===id;});
        if (it){
          var imgs = getImages(it.data||{});
          if (imgs.length) JSTLightbox.open(imgs, 0, (it.data&&it.data.title)||'');
        }
        return;
      }
      var item=e.target.closest('.card-v'); if(!item) return;
      var id=item.dataset.id; var it=(cache[tab]||[]).find(function(x){return x.id===id;}); if(!it) return;
      var d=it.data||{};
      if(e.target.classList.contains('copy')){
        navigator.clipboard.writeText(d.text||'').then(function(){toast('⧉ 已複製：'+(d.title||'提示詞'));});
      } else if(e.target.classList.contains('move')){
        moveItem(id);
      } else if(e.target.classList.contains('edit')){
        editingId=id;
        $('#f-title').value=d.title||''; $('#f-text').value=d.text||''; $('#f-tags').value=(d.tags||[]).join(', ');
        $('#f-folder').value=d.folder||'';
        currentImgs = getImages(d).slice();
        renderImgsStrip();
        $('#save').textContent='✓ 更新提示詞';
        $('#cancel').style.display='inline-block';
        $('#flag').textContent='編輯中…';
        renderDupWarn(); // 編輯時也跑一次（會自動跳過自己）
        window.scrollTo({top:0,behavior:'smooth'}); $('#f-title').focus();
      } else if(e.target.classList.contains('del')){
        if(!confirm('刪除這筆？所有人都會看不到。')) return;
        try{ await api('/api/items/'+id,{method:'DELETE'}); if(editingId===id) resetComposer(); reloadAll(); toast('已刪除'); }
        catch(err){ toast('❌ '+err.message); }
      }
    });

    renderImgsStrip();
  })();
  </script>
</body>
</html>
