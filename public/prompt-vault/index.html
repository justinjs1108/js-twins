<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt 整理 · JS_TWINS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;500;800;900&family=Hanken+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/tool.css" />
  <link rel="stylesheet" href="/css/bg-cyber.css" />
  <script src="/js/bg-cyber.js"></script>
  <script src="/js/guard.js"></script>
  <script src="/js/img.js"></script>
  <style>
    .tabs{display:inline-flex;gap:4px;background:rgba(0,0,0,.4);border:1px solid var(--line);border-radius:999px;padding:5px;margin-bottom:18px}
    .tab{font-family:var(--fm);font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;border:0;background:none;color:var(--text-2);padding:10px 20px;border-radius:999px;cursor:pointer;transition:all .25s var(--ease)}
    .tab.on{background:#fff;color:#000;font-weight:500}
    .tab .c{opacity:.5;margin-left:7px}
    .c-text{font-family:var(--fm);font-size:13px;line-height:1.75;color:var(--text-2);white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.32);border:1px solid var(--line-soft);border-radius:8px;padding:10px 12px;margin-top:6px;max-height:140px;overflow:auto}
    .chips-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center}
    .chip{font-family:var(--fm);font-size:11px;color:var(--text-2);border:1px solid var(--line);border-radius:999px;padding:3px 9px}
    .author{font-family:var(--fm);font-size:10.5px;color:var(--muted);margin-left:auto}
    .editing-flag{font-family:var(--fm);font-size:11.5px;letter-spacing:.1em;color:var(--muted);min-width:0;flex:1}
  </style>
</head>
<body>
  <header class="nav">
    <a class="back" href="/">← JS_TWINS</a>
    <span class="h-title">02 · Prompt Vault</span>
    <div class="h-right">
      <span class="who" id="who"></span>
      <span class="cloud" id="cloud">● 連線中…</span>
    </div>
  </header>

  <main class="wrap">
    <div class="hero">
      <span class="no">02 / PROMPT VAULT</span>
      <h1>Prompt 整理</h1>
      <p>把你的 Midjourney 與 Nano Banana 提示詞收進來，<b style="color:#fff">配上一張縮圖</b>，掃一眼就知道是什麼畫面。所有人共用、雲端永久。</p>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab on" data-tab="mj">Midjourney<span class="c" id="c-mj">0</span></button>
      <button class="tab" data-tab="nb">Nano Banana<span class="c" id="c-nb">0</span></button>
    </div>

    <section class="panel">
      <label>名稱 / 標題</label>
      <input id="f-title" type="text" placeholder="例如：賽博龐克下雨夜街景" />
      <label class="block">提示詞</label>
      <textarea id="f-text" rows="5" placeholder="把提示詞貼在這裡…"></textarea>
      <label class="block">標籤（用逗號分隔）</label>
      <input id="f-tags" type="text" placeholder="例如：cyberpunk, night, neon" />

      <div class="thumb-row">
        <div class="thumb-box" id="thumb-box" title="點擊上傳縮圖（自動壓縮到約 50KB）">
          <span class="ph">📷 點擊<br>上傳縮圖</span>
          <button type="button" class="thumb-rm" id="thumb-rm" title="移除縮圖">✕</button>
        </div>
        <div class="thumb-tip">
          建議放一張預覽圖（截圖或產出範例），方便你和朋友掃一眼就知道是什麼。會自動壓縮、不會占太多空間。
        </div>
      </div>

      <div class="actions">
        <span class="editing-flag" id="flag"></span>
        <button id="cancel" class="btn ghost sm" style="display:none">取消編輯</button>
        <button id="save" class="btn primary">＋ 儲存提示詞</button>
      </div>
      <span id="stat" class="stat" style="display:block;margin-top:8px"></span>
    </section>

    <div class="actions" style="margin-bottom:14px">
      <input id="search" class="search" style="flex:1;background:rgba(0,0,0,.35);color:var(--text);border:1px solid var(--line);border-radius:999px;padding:11px 18px;font-size:14px;font-family:inherit" placeholder="🔍 搜尋名稱、提示詞、標籤…" />
      <span id="count" class="stat" style="flex:0 0 auto"></span>
    </div>

    <section class="history" style="margin-top:0">
      <div class="h-list" id="list"></div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
  (function(){
    var $=function(s){return document.querySelector(s);};
    var tab='mj';
    var KIND={mj:'prompt-mj',nb:'prompt-nb'};
    var cache={mj:null,nb:null};
    var editingId=null;
    var currentThumb=null; // dataURL or null

    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function toast(m){var t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show');},1800);}

    document.addEventListener('jstwins-auth',function(e){
      $('#who').textContent='👤 '+e.detail.user;
      $('#cloud').textContent='● 雲端已連線';$('#cloud').classList.add('live');
      reload('mj'); reload('nb');
    });

    async function api(path,opts){
      opts=opts||{}; opts.credentials='same-origin';
      opts.headers=Object.assign({'Content-Type':'application/json'},opts.headers||{});
      var r=await fetch(path,opts); var d=await r.json();
      if(!r.ok) throw new Error(d.error||'HTTP '+r.status);
      return d;
    }

    async function reload(which){
      try{
        var d=await api('/api/items?kind='+KIND[which]);
        cache[which]=d.items||[];
        $('#c-'+which).textContent=cache[which].length;
        if(which===tab) render();
      }catch(e){ if(which===tab) $('#list').innerHTML='<div class="h-empty">載入失敗：'+esc(e.message)+'</div>'; }
    }

    function render(){
      var q=$('#search').value.trim().toLowerCase();
      var arr=cache[tab]||[];
      var items=arr.filter(function(it){
        var d=it.data||{};
        if(!q) return true;
        return ((d.title||'')+' '+(d.text||'')+' '+((d.tags||[]).join(' '))).toLowerCase().indexOf(q)>=0;
      });
      $('#count').textContent=items.length+' 筆';
      var box=$('#list');
      if(!items.length){ box.innerHTML='<div class="h-empty">'+(q?'找不到符合的提示詞。':'這個分類還沒有提示詞。')+'</div>'; return; }
      box.innerHTML=items.map(function(it){
        var d=it.data||{};
        var date=new Date(it.updated_at||it.created_at).toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
        var tags=(d.tags||[]).map(function(g){return '<span class="chip">'+esc(g)+'</span>';}).join('');
        var by=it.created_by?'<span class="author">— '+esc(it.created_by)+'</span>':'';
        var thumb=d.thumbnail
          ? '<div class="h-thumb" style="background-image:url(\''+esc(d.thumbnail)+'\')"></div>'
          : '<div class="h-thumb empty">無縮圖</div>';
        return '<div class="h-item" data-id="'+it.id+'">'+thumb+
          '<div class="h-main">'+
            '<div class="h-item-head"><div class="h-name'+(d.title?'':' empty')+'">'+esc(d.title||'未命名')+'</div><span class="h-meta">'+date+'</span></div>'+
            '<div class="c-text">'+esc(d.text||'')+'</div>'+
            (tags||by?'<div class="chips-row">'+tags+by+'</div>':'')+
            '<div class="h-acts" style="margin-top:10px"><button class="btn sm edit">✎ 編輯</button><button class="btn sm copy">⧉ 複製</button><button class="btn sm ghost danger del">刪除</button></div>'+
          '</div></div>';
      }).join('');
    }

    function setThumb(dataUrl){
      currentThumb=dataUrl||null;
      var box=$('#thumb-box');
      if(currentThumb){
        var existing=box.querySelector('img');
        if(existing) existing.remove();
        var img=document.createElement('img'); img.src=currentThumb;
        box.insertBefore(img, box.querySelector('.thumb-rm'));
        box.classList.add('has-thumb');
      } else {
        var img2=box.querySelector('img'); if(img2) img2.remove();
        box.classList.remove('has-thumb');
      }
    }

    function resetComposer(){
      editingId=null; $('#f-title').value=''; $('#f-text').value=''; $('#f-tags').value='';
      setThumb(null);
      $('#save').textContent='＋ 儲存提示詞';
      $('#cancel').style.display='none';
      $('#flag').textContent='';
    }

    async function pickThumb(){
      var f=await JSTImg.pickFile(); if(!f) return;
      try{ var url=await JSTImg.resize(f); setThumb(url); toast('已選好縮圖'); }
      catch(e){ toast('❌ '+e.message); }
    }

    async function saveItem(){
      var title=$('#f-title').value.trim();
      var text=$('#f-text').value.trim();
      if(!text){ toast('請貼提示詞'); $('#f-text').focus(); return; }
      var tags=$('#f-tags').value.split(',').map(function(s){return s.trim();}).filter(Boolean);
      var data={title:title,text:text,tags:tags,thumbnail:currentThumb||''};
      var btn=$('#save'); btn.disabled=true;
      try{
        if(editingId){
          await api('/api/items/'+editingId,{method:'PUT',body:JSON.stringify({data:data})});
          toast('✓ 已更新');
        }else{
          await api('/api/items',{method:'POST',body:JSON.stringify({kind:KIND[tab],data:data})});
          toast('✓ 已存到雲端 · '+(tab==='mj'?'Midjourney':'Nano Banana'));
        }
        resetComposer(); reload(tab);
      }catch(e){ toast('❌ '+e.message); }
      finally{ btn.disabled=false; }
    }

    document.getElementById('tabs').addEventListener('click',function(e){
      var b=e.target.closest('.tab'); if(!b) return;
      tab=b.dataset.tab;
      document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('on',x===b);});
      resetComposer(); render();
    });
    $('#save').addEventListener('click',saveItem);
    $('#cancel').addEventListener('click',resetComposer);
    $('#search').addEventListener('input',render);
    $('#thumb-box').addEventListener('click',function(e){ if(e.target.id==='thumb-rm') return; pickThumb(); });
    $('#thumb-rm').addEventListener('click',function(e){ e.stopPropagation(); setThumb(null); });

    $('#list').addEventListener('click',async function(e){
      var item=e.target.closest('.h-item'); if(!item) return;
      var id=item.dataset.id; var it=(cache[tab]||[]).find(function(x){return x.id===id;}); if(!it) return;
      var d=it.data||{};
      if(e.target.classList.contains('edit')){
        editingId=id;
        $('#f-title').value=d.title||''; $('#f-text').value=d.text||''; $('#f-tags').value=(d.tags||[]).join(', ');
        setThumb(d.thumbnail||null);
        $('#save').textContent='✓ 更新提示詞';
        $('#cancel').style.display='inline-block';
        $('#flag').textContent='編輯中…';
        window.scrollTo({top:0,behavior:'smooth'}); $('#f-title').focus();
      } else if(e.target.classList.contains('copy')){
        navigator.clipboard.writeText(d.text||'').then(function(){toast('⧉ 已複製提示詞');});
      } else if(e.target.classList.contains('del')){
        if(!confirm('刪除這筆？所有人都會看不到。')) return;
        try{ await api('/api/items/'+id,{method:'DELETE'}); if(editingId===id) resetComposer(); reload(tab); toast('已刪除'); }
        catch(err){ toast('❌ '+err.message); }
      }
    });
  })();
  </script>
</body>
</html>
